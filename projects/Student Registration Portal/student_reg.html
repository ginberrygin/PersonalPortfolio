Your task is to create a Student Registration Portal 
for a training institute using only HTML. The project 
should demonstrate your understanding of HTML lists, tables, 
forms, and media elements. Design a professional-looking webpage

registered students in a table, showcases media related to the institute,
 and provides easy navigation throughout the page. The goal is to combine all the HTML concepts you have learned into one complete, practical project that closely resembles a real-world website. -->
